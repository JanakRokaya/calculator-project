<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .margin {
            margin: auto;
                width: 50vw;
                height: 50vh;
                background-color: black;
        }
        .number {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: auto;
        }
        p{
            color: white;
            letter-spacing:10px;
            margin: auto;
        }

        .box
        {
            width: 200px;
            height: 20px;
            background-color: rgb(26, 11, 237);
            margin: auto;
        }
        </style>
</head>
<body>
    <div class="margin">
        <div class="number">
            <p>TEN</p>
            <div class="box"></div>
            <p>NINE</p>
            <div class="box"></div>
            <p>EIGHT</p>
            <div class="box"></div>
            <p>SEVEN</p>
            <div class="box"></div>
            <p>SIX</p>
            <div class="box"></div>
            <p>FIVE</p>
            <div class="box"></div>
            <p>FOUR</p>
            <div class="box"></div>
            <p>THREE</p>
            <div class="box"></div>
            <p>TWO</p>
            <div class="box"></div>
            <p>ONE</p>
            <div class="box"></div>
        </div>
    </div>
    
</body>
</html>
