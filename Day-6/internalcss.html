<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            background-color: aqua;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: rgb(6, 48, 235);
        }

        *{
            margin: 0;
            padding: 0;
        }

        p{
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            color: rgb(6, 48, 235);
        }

        .container{
            width: 400px;
            height: 300px;
            background-color: rgb(6, 48, 235);
        }

        .child{
            width: 40px;
            height: 40px;
            background-color: rgb(255, 255, 255);
            margin: 10px;
        }
        #text{
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            color: rgb(6, 48, 235);
            font-size: 30px;
        }
        

    </style>
</head>
<body>
    <h1>Hello World!</h1>
    <p>this is another paragraph describing heading</p>

    <div class="container">
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
    </div>
<br>

<span id="text">csit</span>

</body>
</html>
