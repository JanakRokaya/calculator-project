<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            background-color: lightblue;
        }
        .container{
            width: 100%;
            height: 100vh;
        }

        .box{
            width:200px;
            background-color: wheat;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .button{
            width: 50px;
            height: 50px;
            grid-template-columns: repeat(5,1fr);
            background-color: black;
            color: #2918c5;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="display">
        <div class="box">
            <button>9</button>
            <button>8</button>
            <button>7</button>
            <button>/</button>
            <button>*</button>

            <button>6</button>
            <button>5</button>
            <button>4</button>
            <button>-</button>
            <button>+</button>

            <button>3</button>
            <button>2</button>
            <button>1</button>
            <button>0</button>
            <button>.</button>

            <button class="buttons">C</button>
            <button class="buttons">=</button>
        </div>

    </div>
</body>
</html>
