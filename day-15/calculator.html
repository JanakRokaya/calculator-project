<!DOCTYPE html>
<html>
<head>
    <title>Calculator Layout</title>
    <link rel="stylesheet" href="style.css">
    <style>
        *{
        margin:0;
        padding:0;
        box-sizing:border-box;

    }

    .container{
        width:100vw;
        height:100vh;

        display:flex;
        justify-content:center;
        align-items:center;
    }

    .calculator{
        width:300px;
        padding:20px;
        background:black;
        border-radius:10px;
    }

    .display{
        width:100%;
        height:50px;
        margin-bottom:15px;
        font-size:24px;
        text-align:right;
        padding-right:10px;
    }

    .buttons{
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:10px;
    }

    button{
        height:50px;
        font-size:20px;
        border-radius: 5px;
        cursor:pointer;
    }
        </style>
</head>
<body>

    <div class="container">

        <div class="calculator">

            <input type="text" class="display" readonly>

            <div class="buttons">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>+</button>

                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>-</button>

                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>*</button>

                <button>0</button>
                <button>C</button>
                <button>=</button>
                <button>/</button>
            </div>

        </div>

    </div>

</body>
</html>
