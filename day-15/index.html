<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="path/to/font-awesome/css/font-awesome.min.css">

    <style>
        h1{
            font-family:Georgia, 'Times New Roman', Times, serif;
            font-size: 30px;
        }

        a{
            text-decoration: none;
            padding:9px;
            border-radius:4px;
            background-color: hsl(249, 96%, 48%);
            color: white;
        }
        a:visited{
            background-color:rgb(11, 183, 11);
            color: red;
        }
        a:active{
            background-color: #df0a0a;
            color: white; 
        }
        a:hover{
            background-color: rgb(83, 64, 140);
            color: rgb(16, 186, 160);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Hello </h1>
    <a href="https://fontawesome.com/icons">click here</a>
</body>
</html>
